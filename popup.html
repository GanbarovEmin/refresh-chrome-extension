<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Refresh</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell" aria-live="polite">
      <header class="brand">
        <img class="brand-icon" src="assets/icon.svg" alt="" width="32" height="32">
        <div>
          <h1>Refresh</h1>
          <p>Click inside the page resets</p>
        </div>
        <span id="tab-state" class="state-label">Inactive</span>
      </header>

      <section class="control-group" aria-labelledby="interval-title">
        <div class="section-row">
          <h2 id="interval-title">Interval</h2>
        </div>

        <div class="interval-options" role="radiogroup" aria-label="Refresh interval">
          <label class="interval-option">
            <input type="radio" name="interval" value="60" checked>
            <span>1 min</span>
          </label>
          <label class="interval-option">
            <input type="radio" name="interval" value="300">
            <span>5 min</span>
          </label>
          <label class="interval-option">
            <input type="radio" name="interval" value="600">
            <span>10 min</span>
          </label>
          <label class="interval-option">
            <input type="radio" name="interval" value="custom">
            <span>Custom</span>
          </label>
        </div>

        <label id="custom-field" class="custom-field" for="custom-minutes">
          <span>Custom time</span>
          <div class="custom-input-row">
            <input id="custom-minutes" type="number" min="1" max="999" step="0.5" inputmode="decimal" value="15">
            <span>minutes</span>
          </div>
        </label>
      </section>

      <section class="status-panel" aria-label="Refresh status">
        <div>
          <span class="status-kicker">Next refresh</span>
          <strong id="countdown">Not scheduled</strong>
        </div>
        <p id="status-message">Choose an interval and start refresh for this tab.</p>
        <dl class="stats-list">
          <div>
            <dt>Last refresh</dt>
            <dd id="last-refresh">Never</dd>
          </div>
          <div>
            <dt>Refreshes</dt>
            <dd id="refresh-count">0</dd>
          </div>
          <div>
            <dt>Last reset</dt>
            <dd id="reset-message">Not started</dd>
          </div>
        </dl>
      </section>

      <section class="action-group" aria-label="Refresh controls">
        <button id="toggle-refresh" class="primary-button" type="button">
          Start refresh
        </button>
        <div class="secondary-actions">
          <button id="reset-timer" class="secondary-button" type="button">Reset timer</button>
          <button id="refresh-now" class="secondary-button" type="button">Refresh now</button>
          <button id="stop-refresh" class="secondary-button is-danger" type="button">Stop</button>
        </div>
      </section>
    </main>

    <script src="src/popup.js"></script>
  </body>
</html>
